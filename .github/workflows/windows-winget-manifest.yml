name: Windows WinGet Manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Signed Windows release tag"
        required: true
        type: string
      package_identifier:
        description: "WinGet package identifier"
        required: true
        default: "Lkkisme.CapCN"
        type: string
      publisher:
        description: "Publisher name"
        required: true
        default: "Lkkisme"
        type: string
      package_name:
        description: "Package display name"
        required: true
        default: "Cap 中文版"
        type: string
      expected_publisher_pattern:
        description: "Optional regex for the Authenticode publisher subject"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  generate:
    name: Generate WinGet manifest
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Audit release before WinGet manifest
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          EXPECTED_PUBLISHER_PATTERN: ${{ inputs.expected_publisher_pattern }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $params = @{
            Tag = $env:RELEASE_TAG
            Repository = "${{ github.repository }}"
            OutputDirectory = "windows-release-audit"
            RequireValidSignatures = $true
            RequireTimestampedSignatures = $true
            VerifyChecksums = $true
            VerifyAttestations = $true
          }

          if (-not [string]::IsNullOrWhiteSpace($env:EXPECTED_PUBLISHER_PATTERN)) {
            $params.ExpectedPublisherPattern = $env:EXPECTED_PUBLISHER_PATTERN
          }

          & .\scripts\verify-windows-release.ps1 @params

      - name: Generate WinGet manifest files
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          PACKAGE_IDENTIFIER: ${{ inputs.package_identifier }}
          PUBLISHER: ${{ inputs.publisher }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          & .\scripts\generate-winget-manifest.ps1 `
            -Tag $env:RELEASE_TAG `
            -Repository "${{ github.repository }}" `
            -PackageIdentifier $env:PACKAGE_IDENTIFIER `
            -Publisher $env:PUBLISHER `
            -PackageName $env:PACKAGE_NAME `
            -OutputRoot "packaging\winget"

      - name: Validate manifest when winget is available
        shell: pwsh
        run: |
          $winget = Get-Command winget -ErrorAction SilentlyContinue
          if ($winget) {
            winget validate packaging\winget\manifests
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          } else {
            Write-Host "winget is not available on this runner; upload the manifest artifact and run winget validate locally or in winget-pkgs."
          }

      - name: Upload WinGet manifest
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifest-${{ inputs.tag }}
          path: packaging/winget/manifests/**
          if-no-files-found: error
