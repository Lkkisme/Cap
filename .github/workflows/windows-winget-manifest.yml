name: Windows WinGet Manifest

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Signed Windows release tag"
        required: true
        type: string
      package_identifier:
        description: "WinGet package identifier"
        required: true
        default: "Lkkisme.CapCN"
        type: string
      publisher:
        description: "Publisher name"
        required: true
        default: "Lkkisme"
        type: string
      package_name:
        description: "Package display name"
        required: true
        default: "Cap 中文版"
        type: string
      expected_publisher_pattern:
        description: "Optional override for vars.WINDOWS_SIGNING_PUBLISHER_PATTERN"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
  EXPECTED_PUBLISHER_PATTERN: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_publisher_pattern || vars.WINDOWS_SIGNING_PUBLISHER_PATTERN }}
  PACKAGE_IDENTIFIER: ${{ github.event_name == 'workflow_dispatch' && inputs.package_identifier || vars.WINDOWS_WINGET_PACKAGE_IDENTIFIER || 'Lkkisme.CapCN' }}
  PUBLISHER: ${{ github.event_name == 'workflow_dispatch' && inputs.publisher || vars.WINDOWS_PACKAGE_PUBLISHER || 'Lkkisme' }}
  PACKAGE_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.package_name || vars.WINDOWS_PACKAGE_NAME || 'Cap 中文版' }}

jobs:
  generate:
    name: Generate WinGet manifest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cap-v')
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Audit release before WinGet manifest
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $params = @{
            Tag = $env:RELEASE_TAG
            Repository = "${{ github.repository }}"
            OutputDirectory = "windows-release-audit"
            RequireValidSignatures = $true
            RequireTimestampedSignatures = $true
            RequireSignToolVerification = $true
            VerifyChecksums = $true
            VerifyAttestations = $true
          }

          if (-not [string]::IsNullOrWhiteSpace($env:EXPECTED_PUBLISHER_PATTERN)) {
            $params.ExpectedPublisherPattern = $env:EXPECTED_PUBLISHER_PATTERN
          } else {
            throw "Set expected_publisher_pattern or vars.WINDOWS_SIGNING_PUBLISHER_PATTERN before generating a WinGet manifest."
          }

          & .\scripts\verify-windows-release.ps1 @params

      - name: Generate WinGet manifest files
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          & .\scripts\generate-winget-manifest.ps1 `
            -Tag $env:RELEASE_TAG `
            -Repository "${{ github.repository }}" `
            -PackageIdentifier $env:PACKAGE_IDENTIFIER `
            -Publisher $env:PUBLISHER `
            -PackageName $env:PACKAGE_NAME `
            -OutputRoot "packaging\winget"

      - name: Validate manifest when winget is available
        shell: pwsh
        run: |
          $winget = Get-Command winget -ErrorAction SilentlyContinue
          if ($winget) {
            winget validate packaging\winget\manifests
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          } else {
            Write-Host "winget is not available on this runner; upload the manifest artifact and run winget validate locally or in winget-pkgs."
          }

      - name: Upload WinGet manifest
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifest-${{ env.RELEASE_TAG }}
          path: packaging/winget/manifests/**
          if-no-files-found: error
