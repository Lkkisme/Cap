name: Windows Installer Smoke Test

run-name: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id != '' && format('Windows Installer Smoke Test for {0} from {1}', inputs.tag, inputs.source_run_id) || format('Windows Installer Smoke Test for {0}', github.event_name == 'release' && github.event.release.tag_name || inputs.tag) }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Signed Windows release tag"
        required: true
        type: string
      expected_publisher_pattern:
        description: "Optional override for vars.WINDOWS_SIGNING_PUBLISHER_PATTERN"
        required: false
        default: ""
        type: string
      product_name:
        description: "Windows Add/Remove Programs product name"
        required: true
        default: "Cap 中文版"
        type: string
      source_run_id:
        description: "Optional parent Windows Release run id"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
  EXPECTED_PUBLISHER_PATTERN: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_publisher_pattern || vars.WINDOWS_SIGNING_PUBLISHER_PATTERN }}
  PRODUCT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.product_name || vars.WINDOWS_PACKAGE_NAME || 'Cap 中文版' }}

jobs:
  smoke:
    name: Test Windows installer install and uninstall
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cap-v')
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:EXPECTED_PUBLISHER_PATTERN)) {
            throw "Set expected_publisher_pattern or vars.WINDOWS_SIGNING_PUBLISHER_PATTERN before running the installer smoke test."
          }

          & .\scripts\verify-windows-release.ps1 `
            -Tag $env:RELEASE_TAG `
            -Repository "${{ github.repository }}" `
            -OutputDirectory "windows-installer-smoke-test" `
            -RequireValidSignatures `
            -RequireTimestampedSignatures `
            -RequireSignToolVerification `
            -VerifyChecksums `
            -VerifyAttestations `
            -ScanWithDefender `
            -ExpectedPublisherPattern $env:EXPECTED_PUBLISHER_PATTERN

      - name: Test silent install and uninstall
        shell: pwsh
        run: |
          .\scripts\test-windows-installers.ps1 `
            -Path windows-installer-smoke-test `
            -ProductName $env:PRODUCT_NAME `
            -RemoveExisting `
            -ReportPath "windows-installer-smoke-test\windows-installer-smoke-test-report.md" `
            -JsonPath "windows-installer-smoke-test\windows-installer-smoke-test-results.json"

      - name: Attach smoke test evidence to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $report = "windows-installer-smoke-test\windows-installer-smoke-test-report.md"
          $results = "windows-installer-smoke-test\windows-installer-smoke-test-results.json"

          if (-not (Test-Path -LiteralPath $report)) {
            throw "Missing Windows installer smoke test report."
          }

          if (-not (Test-Path -LiteralPath $results)) {
            throw "Missing Windows installer smoke test results."
          }

          $safeTag = $env:RELEASE_TAG -replace "[^A-Za-z0-9._-]", "-"
          $reportUpload = "windows-installer-smoke-test-report-$safeTag.md"
          $resultsUpload = "windows-installer-smoke-test-results-$safeTag.json"

          Copy-Item -LiteralPath $report -Destination $reportUpload -Force
          Copy-Item -LiteralPath $results -Destination $resultsUpload -Force

          gh release upload $env:RELEASE_TAG $reportUpload $resultsUpload --repo $env:GITHUB_REPOSITORY --clobber

      - name: Upload smoke test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-smoke-test-${{ env.RELEASE_TAG }}
          path: |
            windows-installer-smoke-test/windows-installer-smoke-test-report.md
            windows-installer-smoke-test/windows-installer-smoke-test-results.json
            windows-installer-smoke-test/windows-smartscreen-report.md
            windows-installer-smoke-test/windows-release-assets.json
            windows-installer-smoke-test/SHA256SUMS.txt
            windows-installer-smoke-test/release-SHA256SUMS.txt
            windows-installer-smoke-test/*-install.log
            windows-installer-smoke-test/*-uninstall.log
          if-no-files-found: ignore
