name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "cap-v*"

permissions:
  contents: write
  id-token: write

env:
  APP_CARGO_TOML: apps/desktop/src-tauri/Cargo.toml
  RUST_BACKTRACE: "1"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
      draft: ${{ steps.version.outputs.draft }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read desktop version
        id: version
        shell: bash
        run: |
          version="$(grep -m1 '^version = ' "$APP_CARGO_TOML" | sed -E 's/version = "([^"]+)"/\1/')"
          if [ -z "$version" ]; then
            echo "Unable to read version from $APP_CARGO_TOML" >&2
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            tag_name="$GITHUB_REF_NAME"
          else
            tag_name="cap-v$version"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=Cap 中文版 $version" >> "$GITHUB_OUTPUT"
          echo "draft=${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            slug: windows-x64
          - name: macOS Apple Silicon
            runner: macos-15
            target: aarch64-apple-darwin
            slug: macos-arm64
          - name: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            slug: macos-x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          shared-key: desktop-release-${{ matrix.target }}

      - name: Configure LLVM
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            choco install llvm -y --no-progress
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create build environment
        shell: pwsh
        run: |
          Set-Content -Path .env -Encoding utf8 -Value @(
            "appVersion=${{ needs.metadata.outputs.version }}",
            "VITE_ENVIRONMENT=production",
            "VITE_SERVER_URL=https://cap.so",
            "NEXT_PUBLIC_WEB_URL=https://cap.so"
          )

      - name: Prepare native dependencies
        run: pnpm -w cap-setup
        env:
          RUST_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Build desktop app
        if: runner.os != 'Windows' || vars.WINDOWS_SIGNING_PROVIDER != 'azure-artifact-signing'
        working-directory: apps/desktop
        run: pnpm build:tauri --target ${{ matrix.target }} --config src-tauri/tauri.github-release.conf.json
        env:
          CI: "false"
          RUST_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Build Windows app without bundling
        if: runner.os == 'Windows' && vars.WINDOWS_SIGNING_PROVIDER == 'azure-artifact-signing'
        working-directory: apps/desktop
        run: pnpm build:tauri --target ${{ matrix.target }} --config src-tauri/tauri.github-release.conf.json --no-bundle
        env:
          CI: "false"
          RUST_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Azure login for Windows signing
        if: runner.os == 'Windows' && vars.WINDOWS_SIGNING_PROVIDER == 'azure-artifact-signing'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows app binaries
        if: runner.os == 'Windows' && vars.WINDOWS_SIGNING_PROVIDER == 'azure-artifact-signing'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\target\${{ matrix.target }}\release
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Bundle signed Windows app
        if: runner.os == 'Windows' && vars.WINDOWS_SIGNING_PROVIDER == 'azure-artifact-signing'
        working-directory: apps/desktop
        run: pnpm exec dotenv -e ../../.env -- pnpm tauri bundle --target ${{ matrix.target }} --config src-tauri/tauri.github-release.conf.json
        env:
          CI: "false"
          RUST_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          $patterns = @(
            "target/${{ matrix.target }}/release/bundle/nsis/*.exe",
            "target/${{ matrix.target }}/release/bundle/msi/*.msi",
            "target/${{ matrix.target }}/release/bundle/dmg/*.dmg"
          )
          $files = foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
          }
          if (-not $files) {
            throw "No release assets were produced for ${{ matrix.target }}"
          }
          foreach ($file in $files) {
            $baseName = [System.IO.Path]::GetFileNameWithoutExtension($file.Name)
            $extension = $file.Extension
            Copy-Item -LiteralPath $file.FullName -Destination "release-assets/$baseName-${{ matrix.slug }}$extension"
          }
          Get-ChildItem -Path release-assets

      - name: Sign Windows installers
        if: runner.os == 'Windows' && vars.WINDOWS_SIGNING_PROVIDER == 'azure-artifact-signing'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\release-assets
          files-folder-filter: exe,msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Windows signatures
        if: runner.os == 'Windows' && vars.WINDOWS_SIGNING_PROVIDER == 'azure-artifact-signing'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release-assets -Include *.exe,*.msi -File -Recurse
          if (-not $files) {
            throw "No Windows installers found to verify."
          }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            Write-Host "$($file.Name): $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              throw "$($file.FullName) signature is $($signature.Status): $($signature.StatusMessage)"
            }
          }

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.slug }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag_name }}
          name: ${{ needs.metadata.outputs.release_name }}
          draft: ${{ needs.metadata.outputs.draft }}
          prerelease: false
          fail_on_unmatched_files: true
          files: release-assets/*
          body: |
            下载与电脑匹配的安装包即可使用，无需安装 Node.js、Rust、pnpm 或开发环境。

            Windows 用户下载 `windows-x64.exe` 或 `windows-x64.msi`。
            Apple Silicon Mac 用户下载 `macos-arm64.dmg`。
            Intel Mac 用户下载 `macos-x64.dmg`。

            Windows 包如果已经使用 Azure Artifact Signing 签名，会显示已验证发布者并逐步积累 SmartScreen 声誉。新发布者或新文件仍可能短期显示 SmartScreen 提示。
            `SHA256SUMS.txt` 可用于校验下载文件是否与发布产物一致。
