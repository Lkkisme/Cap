name: Windows Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "cap-v*"

permissions:
  actions: write
  attestations: write
  contents: write
  id-token: write

env:
  APP_CARGO_TOML: apps/desktop/src-tauri/Cargo.toml
  RUST_BACKTRACE: "1"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
      draft: ${{ steps.version.outputs.draft }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read desktop version
        id: version
        shell: bash
        run: |
          version="$(grep -m1 '^version = ' "$APP_CARGO_TOML" | sed -E 's/version = "([^"]+)"/\1/')"
          if [ -z "$version" ]; then
            echo "Unable to read version from $APP_CARGO_TOML" >&2
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            tag_name="$GITHUB_REF_NAME"
            draft="false"
          else
            tag_name="cap-v$version"
            draft="${{ inputs.draft }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=Cap Windows $version" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            slug: windows-x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Windows package metadata
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_PACKAGE_PUBLISHER: ${{ vars.WINDOWS_PACKAGE_PUBLISHER }}
        run: .\scripts\validate-windows-app-metadata.ps1

      - name: Validate Windows signing configuration
        id: signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PROVIDER: ${{ vars.WINDOWS_SIGNING_PROVIDER }}
          WINDOWS_SIGNING_PUBLISHER_PATTERN: ${{ vars.WINDOWS_SIGNING_PUBLISHER_PATTERN }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PFX_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PFX_PASSWORD }}
        run: .\scripts\validate-windows-signing.ps1 -RequireSigning

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          shared-key: desktop-release-${{ matrix.target }}

      - name: Configure LLVM
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path (Join-Path $llvmBin "libclang.dll"))) {
            choco install llvm -y --no-progress
          }
          "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create build environment
        shell: pwsh
        env:
          WINDOWS_DOWNLOAD_URL: ${{ vars.WINDOWS_DOWNLOAD_URL }}
          WINDOWS_PREVIOUS_VERSIONS_URL: ${{ vars.WINDOWS_PREVIOUS_VERSIONS_URL }}
          WINDOWS_PUBLIC_WEB_URL: ${{ vars.WINDOWS_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_WEB_URL: ${{ vars.NEXT_PUBLIC_WEB_URL }}
          WEB_URL: ${{ vars.WEB_URL }}
        run: |
          .\scripts\write-windows-build-env.ps1 -AppVersion "${{ needs.metadata.outputs.version }}"

      - name: Prepare native dependencies
        run: pnpm -w cap-setup
        env:
          RUST_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Build desktop app
        if: runner.os != 'Windows' || (steps.signing.outputs.provider != 'azure-artifact-signing' && steps.signing.outputs.provider != 'pfx' && steps.signing.outputs.provider != 'signpath')
        working-directory: apps/desktop
        run: pnpm build:tauri --target ${{ matrix.target }} --config src-tauri/tauri.github-release.conf.json
        env:
          CI: "false"
          RUST_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Build Windows app without bundling
        if: runner.os == 'Windows' && (steps.signing.outputs.provider == 'azure-artifact-signing' || steps.signing.outputs.provider == 'pfx' || steps.signing.outputs.provider == 'signpath')
        working-directory: apps/desktop
        run: pnpm build:tauri --target ${{ matrix.target }} --config src-tauri/tauri.github-release.conf.json --no-bundle
        env:
          CI: "false"
          RUST_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Azure login for Windows signing
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'azure-artifact-signing'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Import PFX signing certificate
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'pfx'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PFX_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_BASE64)) {
            throw "WINDOWS_CERTIFICATE_PFX_BASE64 is required when WINDOWS_SIGNING_PROVIDER is pfx."
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "windows-code-signing.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password |
            Where-Object { $_.HasPrivateKey } |
            Select-Object -First 1
          if (-not $cert.Thumbprint) {
            throw "Failed to import PFX signing certificate."
          }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows app binaries
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'azure-artifact-signing'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\target\${{ matrix.target }}\release
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows app binaries with PFX
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'pfx'
        shell: pwsh
        run: |
          $signTool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signTool) {
            throw "signtool.exe was not found on the Windows runner."
          }
          $timestampUrl = "${{ vars.WINDOWS_SIGNING_TIMESTAMP_URL }}"
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }
          $files = Get-ChildItem -Path "target/${{ matrix.target }}/release" -Include *.exe,*.dll -File -Recurse
          if (-not $files) {
            throw "No Windows binaries found to sign."
          }
          foreach ($file in $files) {
            & $signTool.FullName sign /fd SHA256 /td SHA256 /tr $timestampUrl /sha1 $env:WINDOWS_CERTIFICATE_THUMBPRINT $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed for $($file.FullName)"
            }
          }

      - name: Stage unsigned Windows app binaries for SignPath
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'signpath'
        id: stage_signpath_windows_app_binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path signpath-windows-app-binaries -Force | Out-Null
          $files = Get-ChildItem -Path "target/${{ matrix.target }}/release" -Include *.exe,*.dll -File -Recurse
          if (-not $files) {
            throw "No Windows app binaries found to sign."
          }
          foreach ($file in $files) {
            Copy-Item -LiteralPath $file.FullName -Destination (Join-Path "signpath-windows-app-binaries" $file.Name) -Force
          }
          Get-ChildItem -Path signpath-windows-app-binaries

      - name: Upload unsigned Windows app binaries for SignPath
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'signpath'
        id: upload_signpath_windows_app_binaries
        uses: actions/upload-artifact@v4
        with:
          name: signpath-windows-app-binaries-${{ matrix.slug }}
          path: signpath-windows-app-binaries/*
          if-no-files-found: error
          retention-days: 1

      - name: Submit SignPath app binary signing request
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'signpath'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload_signpath_windows_app_binaries.outputs.artifact-id }}
          parameters: |
            version: "${{ needs.metadata.outputs.version }}"
          wait-for-completion: true
          output-artifact-directory: signed-windows-app-binaries

      - name: Restore SignPath signed app binaries
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'signpath'
        shell: pwsh
        run: |
          $signedDir = "signed-windows-app-binaries"
          if (-not (Test-Path $signedDir)) {
            throw "Signed app binary directory '$signedDir' not found."
          }
          $files = Get-ChildItem -Path $signedDir -Include *.exe,*.dll -File -Recurse
          if (-not $files) {
            throw "No signed Windows app binaries found in '$signedDir'."
          }
          foreach ($file in $files) {
            Copy-Item -LiteralPath $file.FullName -Destination (Join-Path "target/${{ matrix.target }}/release" $file.Name) -Force
          }

      - name: Verify Windows app binary signatures
        if: runner.os == 'Windows' && (steps.signing.outputs.provider == 'azure-artifact-signing' || steps.signing.outputs.provider == 'pfx' || steps.signing.outputs.provider == 'signpath')
        shell: pwsh
        env:
          WINDOWS_SIGNING_PUBLISHER_PATTERN: ${{ vars.WINDOWS_SIGNING_PUBLISHER_PATTERN }}
        run: |
          $files = Get-ChildItem -Path "target/${{ matrix.target }}/release" -Include *.exe,*.dll -File -Recurse
          if (-not $files) {
            throw "No Windows app binaries found to verify."
          }
          foreach ($file in $files) {
            $result = .\scripts\test-windows-authenticode.ps1 -Path $file.FullName -RequireValidSignature -RequireTimestamp -RequireSignToolVerification -ExpectedPublisherPattern $env:WINDOWS_SIGNING_PUBLISHER_PATTERN
            Write-Host "$($file.Name): $($result.SignatureStatus)"
            Write-Host "$($file.Name) publisher: $($result.Publisher)"
            Write-Host "$($file.Name) timestamp: $($result.TimestampAuthority)"
            Write-Host "$($file.Name) signtool: $($result.SignToolStatus)"
          }

      - name: Bundle signed Windows app
        if: runner.os == 'Windows' && (steps.signing.outputs.provider == 'azure-artifact-signing' || steps.signing.outputs.provider == 'pfx' || steps.signing.outputs.provider == 'signpath')
        working-directory: apps/desktop
        run: pnpm exec dotenv -e ../../.env -- pnpm tauri bundle --target ${{ matrix.target }} --config src-tauri/tauri.github-release.conf.json
        env:
          CI: "false"
          RUST_TARGET_TRIPLE: ${{ matrix.target }}

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          $patterns = @(
            "target/${{ matrix.target }}/release/bundle/nsis/*.exe",
            "target/${{ matrix.target }}/release/bundle/msi/*.msi"
          )
          $files = foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
          }
          if (-not $files) {
            throw "No release assets were produced for ${{ matrix.target }}"
          }
          foreach ($file in $files) {
            $baseName = [System.IO.Path]::GetFileNameWithoutExtension($file.Name)
            $extension = $file.Extension
            Copy-Item -LiteralPath $file.FullName -Destination "release-assets/$baseName-${{ matrix.slug }}$extension"
          }
          Get-ChildItem -Path release-assets

      - name: Sign Windows installers
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'azure-artifact-signing'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\release-assets
          files-folder-filter: exe,msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows installers with PFX
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'pfx'
        shell: pwsh
        run: |
          $signTool = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signTool) {
            throw "signtool.exe was not found on the Windows runner."
          }
          $timestampUrl = "${{ vars.WINDOWS_SIGNING_TIMESTAMP_URL }}"
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }
          $files = Get-ChildItem -Path release-assets -Include *.exe,*.msi -File -Recurse
          if (-not $files) {
            throw "No Windows installers found to sign."
          }
          foreach ($file in $files) {
            & $signTool.FullName sign /fd SHA256 /td SHA256 /tr $timestampUrl /sha1 $env:WINDOWS_CERTIFICATE_THUMBPRINT $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed for $($file.FullName)"
            }
          }

      - name: Upload unsigned Windows installers for SignPath
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'signpath'
        id: upload_signpath_windows_installers
        uses: actions/upload-artifact@v4
        with:
          name: signpath-windows-installers-${{ matrix.slug }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 1

      - name: Submit SignPath signing request
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'signpath'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload_signpath_windows_installers.outputs.artifact-id }}
          parameters: |
            version: "${{ needs.metadata.outputs.version }}"
          wait-for-completion: true
          output-artifact-directory: signed-windows-installers

      - name: Restore SignPath signed installers
        if: runner.os == 'Windows' && steps.signing.outputs.provider == 'signpath'
        shell: pwsh
        run: |
          $signedDir = "signed-windows-installers"
          if (-not (Test-Path $signedDir)) {
            throw "Signed artifact directory '$signedDir' not found."
          }
          $files = Get-ChildItem -Path $signedDir -Include *.exe,*.msi -File -Recurse
          if (-not $files) {
            throw "No signed Windows installers found in '$signedDir'."
          }
          foreach ($file in $files) {
            Copy-Item -LiteralPath $file.FullName -Destination (Join-Path "release-assets" $file.Name) -Force
          }
          Get-ChildItem -Path release-assets

      - name: Verify Windows signatures
        if: runner.os == 'Windows' && (steps.signing.outputs.provider == 'azure-artifact-signing' || steps.signing.outputs.provider == 'pfx' || steps.signing.outputs.provider == 'signpath')
        shell: pwsh
        env:
          WINDOWS_SIGNING_PUBLISHER_PATTERN: ${{ vars.WINDOWS_SIGNING_PUBLISHER_PATTERN }}
        run: |
          $files = Get-ChildItem -Path release-assets -Include *.exe,*.msi -File -Recurse
          if (-not $files) {
            throw "No Windows installers found to verify."
          }
          foreach ($file in $files) {
            $result = .\scripts\test-windows-authenticode.ps1 -Path $file.FullName -RequireValidSignature -RequireTimestamp -RequireSignToolVerification -ExpectedPublisherPattern $env:WINDOWS_SIGNING_PUBLISHER_PATTERN
            Write-Host "$($file.Name): $($result.SignatureStatus)"
            Write-Host "$($file.Name) publisher: $($result.Publisher)"
            Write-Host "$($file.Name) timestamp: $($result.TimestampAuthority)"
            Write-Host "$($file.Name) signtool: $($result.SignToolStatus)"
          }

      - name: Stage portable Windows ZIP
        if: runner.os == 'Windows' && (steps.signing.outputs.provider == 'azure-artifact-signing' || steps.signing.outputs.provider == 'pfx' || steps.signing.outputs.provider == 'signpath')
        shell: pwsh
        run: |
          $releaseRoot = "target/${{ matrix.target }}/release"
          $mainExe = Join-Path $releaseRoot "Cap-CN.exe"
          if (-not (Test-Path -LiteralPath $mainExe)) {
            throw "Signed Cap-CN.exe was not found at $mainExe."
          }

          $packageRoot = Join-Path $env:RUNNER_TEMP "cap-portable-${{ matrix.slug }}"
          $appDirectory = Join-Path $packageRoot "Cap-CN"
          if (Test-Path -LiteralPath $packageRoot) {
            Remove-Item -LiteralPath $packageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $appDirectory -Force | Out-Null

          Copy-Item -LiteralPath $mainExe -Destination $appDirectory -Force
          $dllFiles = Get-ChildItem -LiteralPath $releaseRoot -Filter *.dll -File
          foreach ($file in $dllFiles) {
            Copy-Item -LiteralPath $file.FullName -Destination $appDirectory -Force
          }
          $resourceDirectories = @("resources", "assets")
          foreach ($directoryName in $resourceDirectories) {
            $sourceDirectory = Join-Path $releaseRoot $directoryName
            if (Test-Path -LiteralPath $sourceDirectory) {
              Copy-Item -LiteralPath $sourceDirectory -Destination $appDirectory -Recurse -Force
            }
          }

          $zipPath = Join-Path "release-assets" "Cap-CN-${{ needs.metadata.outputs.version }}-${{ matrix.slug }}-portable.zip"
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -LiteralPath $appDirectory -DestinationPath $zipPath -CompressionLevel Optimal
          Get-ChildItem -LiteralPath $appDirectory
          Get-Item -LiteralPath $zipPath

      - name: Verify portable Windows ZIP contents
        if: runner.os == 'Windows' && (steps.signing.outputs.provider == 'azure-artifact-signing' || steps.signing.outputs.provider == 'pfx' || steps.signing.outputs.provider == 'signpath')
        shell: pwsh
        env:
          WINDOWS_SIGNING_PUBLISHER_PATTERN: ${{ vars.WINDOWS_SIGNING_PUBLISHER_PATTERN }}
        run: |
          $zip = Get-ChildItem -Path release-assets -Filter "*portable.zip" -File | Select-Object -First 1
          if (-not $zip) {
            throw "Portable Windows ZIP was not staged."
          }

          $extractRoot = Join-Path $env:RUNNER_TEMP "cap-portable-verify-${{ matrix.slug }}"
          if (Test-Path -LiteralPath $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $extractRoot -Force | Out-Null
          Expand-Archive -LiteralPath $zip.FullName -DestinationPath $extractRoot -Force

          $files = Get-ChildItem -LiteralPath $extractRoot -Include *.exe,*.dll -File -Recurse
          if (-not $files) {
            throw "$($zip.Name) does not contain Windows EXE/DLL files."
          }

          foreach ($file in $files) {
            $result = .\scripts\test-windows-authenticode.ps1 -Path $file.FullName -RequireValidSignature -RequireTimestamp -RequireSignToolVerification -ExpectedPublisherPattern $env:WINDOWS_SIGNING_PUBLISHER_PATTERN
            Write-Host "$($file.Name): $($result.SignatureStatus)"
            Write-Host "$($file.Name) publisher: $($result.Publisher)"
            Write-Host "$($file.Name) timestamp: $($result.TimestampAuthority)"
            Write-Host "$($file.Name) signtool: $($result.SignToolStatus)"
          }

      - name: Scan Windows release assets with Microsoft Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\scan-windows-assets.ps1 -Path release-assets -Include "*.exe", "*.msi", "*.zip" -RequireScanner

      - name: Remove imported PFX signing certificate
        if: always() && runner.os == 'Windows' && steps.signing.outputs.provider == 'pfx'
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) {
            Remove-Item -LiteralPath "Cert:\CurrentUser\My\$env:WINDOWS_CERTIFICATE_THUMBPRINT" -Force -ErrorAction SilentlyContinue
          }
          Remove-Item -LiteralPath (Join-Path $env:RUNNER_TEMP "windows-code-signing.pfx") -Force -ErrorAction SilentlyContinue

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.slug }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: release-assets/*

      - name: Block overwrite of existing public release
        if: needs.metadata.outputs.draft != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
        run: |
          response="$(curl -sS -w '\n%{http_code}' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/releases/tags/$TAG_NAME")"
          status="$(printf '%s' "$response" | tail -n 1)"
          body="$(printf '%s' "$response" | sed '$d')"

          if [ "$status" = "404" ]; then
            exit 0
          fi

          if [ "$status" != "200" ]; then
            echo "$body" >&2
            echo "GitHub release lookup failed with HTTP $status." >&2
            exit 1
          fi

          is_draft="$(printf '%s' "$body" | node -e "let input = ''; process.stdin.on('data', d => input += d); process.stdin.on('end', () => process.stdout.write(String(JSON.parse(input).draft)));")"
          if [ "$is_draft" != "true" ]; then
            echo "Release '$TAG_NAME' already exists and is public. Publish a new tag instead of replacing Windows assets."
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag_name }}
          name: ${{ needs.metadata.outputs.release_name }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: release-assets/*
          body: |
            Download the Windows x64 EXE installer, MSI installer, or portable ZIP. Users do not need Node.js, Rust, pnpm, or a development environment.

            Windows EXE/MSI assets are Authenticode signed and verified before upload. The portable ZIP contains the same signed Windows app binary and DLLs after verification. New publishers or new files can still show SmartScreen warnings until Microsoft reputation builds.

            SHA256SUMS.txt can be used to verify downloaded files. Verified public releases also include windows-smartscreen-report-<tag>.md, windows-release-assets-<tag>.json, windows-installer-smoke-test-report-<tag>.md, windows-installer-smoke-test-results-<tag>.json, windows-winget-manifest-<tag>.zip, windows-winget-submission-<tag>.md, windows-wdsi-submission-checklist-<tag>.md, and windows-wdsi-submission-text-<tag>.zip after the Windows release audit, installer smoke test, WinGet manifest, and WDSI package workflows pass.

      - name: Run Windows release evidence workflows
        if: needs.metadata.outputs.draft != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
          PACKAGE_IDENTIFIER: ${{ vars.WINDOWS_WINGET_PACKAGE_IDENTIFIER || 'Lkkisme.CapCN' }}
          PRODUCT_NAME: ${{ vars.WINDOWS_PACKAGE_NAME || 'Cap 中文版' }}
          PUBLISHER: ${{ vars.WINDOWS_PACKAGE_PUBLISHER || 'Lkkisme' }}
        run: |
          set -euo pipefail
          dispatched_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          runs=()

          dispatch_run() {
            local workflow="$1"
            shift
            gh workflow run "$workflow" --ref "$GITHUB_REF_NAME" "$@" -f source_run_id="$GITHUB_RUN_ID"

            local run_id=""
            for attempt in {1..30}; do
              run_id="$(gh run list --workflow "$workflow" --event workflow_dispatch --limit 20 --json databaseId,createdAt,displayTitle --jq ".[] | select(.createdAt >= \"$dispatched_at\" and (.displayTitle | contains(\"from $GITHUB_RUN_ID\"))) | .databaseId" | head -n 1)"
              if [ -n "$run_id" ]; then
                break
              fi
              sleep 5
            done

            if [ -z "$run_id" ]; then
              echo "Unable to find dispatched run for $workflow."
              exit 1
            fi

            runs+=("$workflow:$run_id")
          }

          dispatch_run "windows-release-audit.yml" -f tag="$TAG_NAME"
          dispatch_run "windows-installer-smoke-test.yml" -f tag="$TAG_NAME" -f product_name="$PRODUCT_NAME"
          dispatch_run "windows-winget-manifest.yml" -f tag="$TAG_NAME" -f package_identifier="$PACKAGE_IDENTIFIER" -f publisher="$PUBLISHER" -f package_name="$PRODUCT_NAME"
          dispatch_run "windows-wdsi-package.yml" -f tag="$TAG_NAME" -f product_name="$PRODUCT_NAME"

          for run in "${runs[@]}"; do
            workflow="${run%%:*}"
            run_id="${run##*:}"
            echo "Waiting for $workflow run $run_id."
            gh run watch "$run_id" --exit-status --interval 30
          done

      - name: Verify release evidence assets
        if: needs.metadata.outputs.draft != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
        run: |
          set -euo pipefail
          safe_tag="$(printf '%s' "$TAG_NAME" | sed -E 's/[^A-Za-z0-9._-]/-/g')"
          asset_names="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" --jq ".assets[].name")"

          require_asset() {
            local name="$1"
            if ! printf '%s\n' "$asset_names" | grep -Fxq "$name"; then
              echo "Missing release asset: $name" >&2
              printf '%s\n' "$asset_names" >&2
              exit 1
            fi
          }

          require_pattern() {
            local pattern="$1"
            local label="$2"
            if ! printf '%s\n' "$asset_names" | grep -Eiq "$pattern"; then
              echo "Missing release asset matching $label" >&2
              printf '%s\n' "$asset_names" >&2
              exit 1
            fi
          }

          require_pattern '\.exe$' "Windows EXE installer"
          require_pattern '\.msi$' "Windows MSI installer"
          require_pattern 'windows-x64-portable\.zip$' "Windows portable ZIP"
          require_asset "SHA256SUMS.txt"
          require_asset "windows-smartscreen-report-$safe_tag.md"
          require_asset "windows-release-assets-$safe_tag.json"
          require_asset "windows-installer-smoke-test-report-$safe_tag.md"
          require_asset "windows-installer-smoke-test-results-$safe_tag.json"
          require_asset "windows-winget-manifest-$safe_tag.zip"
          require_asset "windows-winget-submission-$safe_tag.md"
          require_asset "windows-wdsi-submission-checklist-$safe_tag.md"
          require_asset "windows-wdsi-submission-text-$safe_tag.zip"

      - name: Verify release evidence manifest
        if: needs.metadata.outputs.draft != 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
        run: |
          $params = @{
            Repository = $env:GITHUB_REPOSITORY
            Tag = $env:TAG_NAME
            Mode = "report"
            OutputDirectory = "windows-release-publish-gate"
            FailOnUnsafe = $true
          }

          & (Join-Path $env:GITHUB_WORKSPACE "scripts/protect-windows-release-assets.ps1") @params

      - name: Upload Windows publish gate report
        if: always() && needs.metadata.outputs.draft != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-publish-gate-${{ needs.metadata.outputs.tag_name }}
          path: windows-release-publish-gate/*
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish verified GitHub release
        if: needs.metadata.outputs.draft != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.metadata.outputs.tag_name }}
        run: |
          set -euo pipefail
          release_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" --jq ".id")"
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" -F draft=false
