name: Windows WDSI Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Signed Windows release tag"
        required: true
        type: string
      expected_publisher_pattern:
        description: "Optional regex for the Authenticode publisher subject"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Generate WDSI submission package
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate WDSI package
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          EXPECTED_PUBLISHER_PATTERN: ${{ inputs.expected_publisher_pattern }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $params = @{
            Tag = $env:RELEASE_TAG
            Repository = "${{ github.repository }}"
            OutputDirectory = "windows-wdsi-package"
          }

          if (-not [string]::IsNullOrWhiteSpace($env:EXPECTED_PUBLISHER_PATTERN)) {
            $params.ExpectedPublisherPattern = $env:EXPECTED_PUBLISHER_PATTERN
          }

          & .\scripts\new-wdsi-submission-package.ps1 @params

      - name: Upload WDSI package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-wdsi-package-${{ inputs.tag }}
          path: windows-wdsi-package/**
          if-no-files-found: ignore
