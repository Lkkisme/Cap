name: Windows WDSI Package

run-name: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id != '' && format('Windows WDSI Package for {0} from {1}', inputs.tag, inputs.source_run_id) || format('Windows WDSI Package for {0}', github.event_name == 'release' && github.event.release.tag_name || inputs.tag) }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Signed Windows release tag"
        required: true
        type: string
      expected_publisher_pattern:
        description: "Optional override for vars.WINDOWS_SIGNING_PUBLISHER_PATTERN"
        required: false
        default: ""
        type: string
      product_name:
        description: "Product name shown in WDSI submission text"
        required: true
        default: "Cap 中文版"
        type: string
      source_run_id:
        description: "Optional parent Windows Release run id"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  attestations: read

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
  EXPECTED_PUBLISHER_PATTERN: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_publisher_pattern || vars.WINDOWS_SIGNING_PUBLISHER_PATTERN }}
  PRODUCT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.product_name || vars.WINDOWS_PACKAGE_NAME || 'Cap 中文版' }}

jobs:
  package:
    name: Generate WDSI submission package
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cap-v')
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate WDSI package
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $params = @{
            Tag = $env:RELEASE_TAG
            Repository = "${{ github.repository }}"
            OutputDirectory = "windows-wdsi-package"
            ProductName = $env:PRODUCT_NAME
          }

          if (-not [string]::IsNullOrWhiteSpace($env:EXPECTED_PUBLISHER_PATTERN)) {
            $params.ExpectedPublisherPattern = $env:EXPECTED_PUBLISHER_PATTERN
          } else {
            throw "Set expected_publisher_pattern or vars.WINDOWS_SIGNING_PUBLISHER_PATTERN before generating a WDSI package."
          }

          & .\scripts\new-wdsi-submission-package.ps1 @params

      - name: Attach WDSI evidence to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $checklist = "windows-wdsi-package\wdsi-submission-package\wdsi-submission-checklist.md"
          $submissionText = "windows-wdsi-package\wdsi-submission-package\submission-text"

          if (-not (Test-Path -LiteralPath $checklist)) {
            throw "Missing WDSI submission checklist."
          }

          if (-not (Test-Path -LiteralPath $submissionText)) {
            throw "Missing WDSI submission text directory."
          }

          $safeTag = $env:RELEASE_TAG -replace "[^A-Za-z0-9._-]", "-"
          $checklistUpload = "windows-wdsi-submission-checklist-$safeTag.md"
          $submissionTextUpload = "windows-wdsi-submission-text-$safeTag.zip"

          Copy-Item -LiteralPath $checklist -Destination $checklistUpload -Force
          Compress-Archive -Path (Join-Path $submissionText "*") -DestinationPath $submissionTextUpload -Force

          gh release upload $env:RELEASE_TAG $checklistUpload $submissionTextUpload --repo $env:GITHUB_REPOSITORY --clobber

      - name: Upload WDSI package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-wdsi-package-${{ env.RELEASE_TAG }}
          path: windows-wdsi-package/**
          if-no-files-found: ignore
