name: Windows Release Audit

run-name: ${{ github.event_name == 'workflow_dispatch' && inputs.source_run_id != '' && format('Windows Release Audit for {0} from {1}', inputs.tag, inputs.source_run_id) || format('Windows Release Audit for {0}', github.event_name == 'release' && github.event.release.tag_name || inputs.tag) }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to audit"
        required: true
        type: string
      expected_publisher_pattern:
        description: "Optional override for vars.WINDOWS_SIGNING_PUBLISHER_PATTERN"
        required: false
        default: ""
        type: string
      source_run_id:
        description: "Optional parent Windows Release run id"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  attestations: read

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
  EXPECTED_PUBLISHER_PATTERN: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_publisher_pattern || vars.WINDOWS_SIGNING_PUBLISHER_PATTERN }}

jobs:
  audit:
    name: Audit Windows release assets
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cap-v')
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Windows release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $params = @{
            Tag = $env:RELEASE_TAG
            Repository = "${{ github.repository }}"
            OutputDirectory = "windows-release-audit"
            RequireValidSignatures = $true
            RequireTimestampedSignatures = $true
            RequireSignToolVerification = $true
            VerifyChecksums = $true
            VerifyAttestations = $true
            ScanWithDefender = $true
          }

          if (-not [string]::IsNullOrWhiteSpace($env:EXPECTED_PUBLISHER_PATTERN)) {
            $params.ExpectedPublisherPattern = $env:EXPECTED_PUBLISHER_PATTERN
          } else {
            throw "Set expected_publisher_pattern or vars.WINDOWS_SIGNING_PUBLISHER_PATTERN before auditing Windows release assets."
          }

          & .\scripts\verify-windows-release.ps1 @params

      - name: Attach audit evidence to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $report = "windows-release-audit\windows-smartscreen-report.md"
          $assetManifest = "windows-release-audit\windows-release-assets.json"

          if (-not (Test-Path -LiteralPath $report)) {
            throw "Missing Windows SmartScreen report."
          }

          if (-not (Test-Path -LiteralPath $assetManifest)) {
            throw "Missing Windows release asset manifest."
          }

          $safeTag = $env:RELEASE_TAG -replace "[^A-Za-z0-9._-]", "-"
          $reportUpload = "windows-smartscreen-report-$safeTag.md"
          $assetManifestUpload = "windows-release-assets-$safeTag.json"

          Copy-Item -LiteralPath $report -Destination $reportUpload -Force
          Copy-Item -LiteralPath $assetManifest -Destination $assetManifestUpload -Force

          gh release upload $env:RELEASE_TAG $reportUpload $assetManifestUpload --repo $env:GITHUB_REPOSITORY --clobber

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-audit-${{ env.RELEASE_TAG }}
          path: |
            windows-release-audit/windows-smartscreen-report.md
            windows-release-audit/windows-release-assets.json
            windows-release-audit/SHA256SUMS.txt
            windows-release-audit/release-SHA256SUMS.txt
          if-no-files-found: ignore
