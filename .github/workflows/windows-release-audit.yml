name: Windows Release Audit

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to audit"
        required: true
        type: string
      expected_publisher_pattern:
        description: "Optional regex for the Authenticode publisher subject"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
  EXPECTED_PUBLISHER_PATTERN: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_publisher_pattern || '' }}

jobs:
  audit:
    name: Audit Windows release assets
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cap-v')
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Windows release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $params = @{
            Tag = $env:RELEASE_TAG
            Repository = "${{ github.repository }}"
            OutputDirectory = "windows-release-audit"
            RequireValidSignatures = $true
            RequireTimestampedSignatures = $true
            RequireSignToolVerification = $true
            VerifyChecksums = $true
            VerifyAttestations = $true
          }

          if (-not [string]::IsNullOrWhiteSpace($env:EXPECTED_PUBLISHER_PATTERN)) {
            $params.ExpectedPublisherPattern = $env:EXPECTED_PUBLISHER_PATTERN
          }

          & .\scripts\verify-windows-release.ps1 @params

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-audit-${{ env.RELEASE_TAG }}
          path: windows-release-audit/*
          if-no-files-found: ignore
